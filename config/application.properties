# 阿里百炼 API 配置；不要写环境变量，打包后与 jar 同级保留 config 目录即可。
dashscope.api-key=请填写你的DashScope_API_KEY
dashscope.compatible-chat-url=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
dashscope.image-generation-url=https://dashscope.aliyuncs.com/api/v1/services/aigc/text2image/image-synthesis
dashscope.task-query-url-prefix=https://dashscope.aliyuncs.com/api/v1/tasks/

model.text=qwen-max
model.vision=qwen-vl-max
model.image=qwen-image-generation

ffmpeg.path=bin/ffmpeg.exe
video.watermark-text=本片由AI生成，仅供娱乐
video.watermark-font-file=C:/Windows/Fonts/msyh.ttc
video.watermark-x=20
video.watermark-y=20
video.output-width=1920
video.output-height=1080
video.crf=23
video.preset=medium

image.output-size=1024*1024
image.poll-interval-ms=2000
image.poll-timeout-seconds=180
